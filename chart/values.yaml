replicaCount: 1
image:
  repository: "waiilabs/sandbox"
  tag: latest
  pullPolicy: IfNotPresent
  platform: linux/amd64
service:
  type: ClusterIP
  port: 3456
env:
  openaiApiKey: ''
  waiiDefaultApiKey: ''
imagePullSecrets:
  - name: regcred
conf:
  JSON_SCHEME_SERIALIZER: genson
  GENERATE_FROM_LIKED_QUERY: few-shot
  REPORTING_VIEW_INITIALIZATION_DELAY_SEC: 0